name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Topzinto.Erp.sln

      - name: Build
        run: dotnet build Topzinto.Erp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Topzinto.Erp.sln --configuration Release --no-build --verbosity normal

  web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Topzinto.Erp.Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/Topzinto.Erp.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t topzinto-api:ci .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t topzinto-web:ci .
